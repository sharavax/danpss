<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANPSS Student Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding:20px 0;
}

.profile-card{
    background:#fff;
    border-radius:12px;
    padding:30px 20px;
    margin-top:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.profile-card h3{
    font-size:clamp(1.3rem, 5vw, 1.75rem);
    margin-bottom:1.5rem;
}

.profile-card h5{
    font-size:clamp(1.1rem, 4vw, 1.3rem);
    margin:1.5rem 0 1rem 0;
    font-weight:600;
}

.profile-card .form-label{
    font-weight:500;
    font-size:0.95rem;
    margin-bottom:0.4rem;
}

.profile-card .form-control,
.profile-card .form-select{
    border-radius:8px;
    border:1px solid #ddd;
    padding:0.6rem 0.9rem;
}

.profile-card .form-control:focus,
.profile-card .form-select:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 0.2rem rgba(13, 110, 253, 0.15);
}

.profile-card .btn{
    padding:0.7rem 1.5rem;
    font-weight:500;
    border-radius:8px;
}

.profile-card .row{
    margin-left:-0.5rem;
    margin-right:-0.5rem;
}

@media(max-width:768px){
    .profile-card{
        padding:25px 15px;
    }
}
</style>
</head>

<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">DANPSS</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="alumnireg.html">Alumni</a></li>
<li class="nav-item"><a class="nav-link" href="studentprofile.html">Students</a></li>
<li class="nav-item"><a class="nav-link" href="jobpost.html">Placements</a></li>
<li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
</ul>
</div>
</div>
</nav>

<div class="container-fluid">
<div class="row justify-content-center">
<div class="col-12 col-lg-9 col-xl-8">

<div class="profile-card">

<h3 class="text-center text-primary mb-4">Student Profile Creation - DANPSS</h3>

<form action="/danpss/student/profile" method="post" onsubmit="return validateStudentForm()" novalidate>

<h5 class="text-secondary">Personal Details</h5>

<div class="row">
<div class="col-md-6 mb-3">
<label>Full Name</label>
<input type="text" id="studentName" name="studentName" class="form-control" placeholder="Enter Name" required>
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" id="studentEmail" name="studentEmail" class="form-control" placeholder="Enter Email" required>
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>Phone Number</label>
<input type="tel" id="studentPhone" name="studentPhone" class="form-control" placeholder="Enter Phone">
</div>

<div class="col-md-6 mb-3">
<label>Graduation Year</label>
<input type="number" id="studentGraduationYear" name="studentGraduationYear" class="form-control" placeholder="e.g. 2026">
</div>
</div>

<div class="mb-3">
<label>Department</label>
<input type="text" id="studentDepartment" name="studentDepartment" class="form-control" placeholder="CSE / ECE / IT">
</div>

<hr>

<h5 class="text-secondary">Career Details</h5>

<div class="row">
<div class="col-md-6 mb-3">
<label>Current Company (Optional)</label>
<input type="text" id="studentCompany" name="studentCompany" class="form-control" placeholder="Company Name">
</div>

<div class="col-md-6 mb-3">
<label>Designation</label>
<input type="text" id="studentDesignation" name="studentDesignation" class="form-control" placeholder="Student / Intern / Role">
</div>
</div>

<div class="mb-3">
<label>Experience (Years)</label>
<input type="number" id="studentExperience" name="studentExperience" class="form-control" placeholder="0 if Fresher">
</div>

<div class="mb-3">
<label>Skills / Domain</label>
<input type="text" id="studentSkills" name="studentSkills" class="form-control" placeholder="Java, Web Dev, AI, Data Science">
</div>

<div class="mb-3">
<label>Upload Resume</label>
<input type="file" class="form-control">
</div>

<div class="d-grid mt-4">
<button type="submit" class="btn btn-primary btn-lg">Create Profile</button>
</div>

</form>

</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="validation.js"></script>
</body>
</html>
