<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DANPSS Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#0d6efd,#6610f2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    padding:20px;
}

.login-card{
    background:white;
    padding:30px 20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:100%;
    max-width:420px;
}

.login-card h3{
    font-size:clamp(1.3rem, 5vw, 1.75rem);
    margin-bottom:0.5rem;
}

.login-card .form-label{
    font-weight:500;
    font-size:0.95rem;
}

.login-card .form-control{
    border-radius:8px;
    border:1px solid #ddd;
    padding:0.6rem 0.9rem;
}

.login-card .form-control:focus{
    border-color:#0d6efd;
    box-shadow:0 0 0 0.2rem rgba(13, 110, 253, 0.15);
}

.login-card .btn{
    padding:0.7rem;
    font-weight:500;
    border-radius:8px;
}

.brand{
    font-weight:bold;
    color:#0d6efd;
}

@media(max-width:576px){
    .login-card{
        padding:25px 15px;
    }
}
</style>
</head>

<body>

<!-- ✅ Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">
<a class="navbar-brand fw-bold" href="index.html">DANPSS</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="alumnireg.html">Alumni</a></li>
<li class="nav-item"><a class="nav-link" href="studentprofile.html">Students</a></li>
<li class="nav-item"><a class="nav-link" href="jobpost.html">Placements</a></li>
<li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
<li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
</ul>
</div>
</div>
</nav>

<div class="login-card">

<h3 class="text-center mb-3 brand">DANPSS Login</h3>
<p class="text-center text-muted">Alumni & Student Portal</p>

<form action="/danpss/login" method="post" onsubmit="return validateLogin()" novalidate>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="loginEmail" name="loginEmail" class="form-control" placeholder="Enter email" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" id="loginPass" name="loginPass" class="form-control" placeholder="Enter password" required>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary">Login</button>
</div>

<div class="text-center mt-3">
<a href="#">Forgot Password?</a>
</div>

<hr>

<p class="text-center">
New User? <a href="register.html">Register Here</a>
</p>

</form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="validation.js"></script>
</body>
</html>
